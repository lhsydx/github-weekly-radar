name: Weekly Open Source Radar

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/weekly-radar.yml"
      - "config/**"
      - "scripts/**"
      - "tests/**"
  schedule:
    # Beijing time Monday 08:00 (UTC Monday 00:00)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-open-source-radar
  cancel-in-progress: false

jobs:
  build-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Collect repositories and build report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/radar.py

      - name: Commit weekly snapshot and report
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No report changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          git commit -m "chore: update weekly radar [skip ci]"
          git push
